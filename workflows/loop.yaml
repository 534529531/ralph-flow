description: 单步骤循环执行，适合简单任务的持续迭代直到完成

manual_step:

steps:
  - id: loop
    desc: 自动循环执行任务
    do: |
      执行用户指定的任务。

      你需要：
      1. 理解用户需求的每一个要点
      2. 逐一实现或完成每个要求
      3. 遇到问题主动解决，不要跳过或放弃
    input: 用户输入的任务描述
    output: 任务完成的证明（代码、文件、测试结果等）
    check: |
      以独立审查员视角检查工作成果。

      检查维度：
      1. **完整性**：对照用户需求，检查是否所有要点都已实现，有无遗漏
      2. **正确性**：验证实现是否正确，能否达到预期效果
      3. **质量**：检查代码/内容是否合理，有无明显问题
      4. **可验证性**：尝试运行或验证结果，确认实际效果符合预期

      根据任务类型，选择适用的验证方式：
      - 代码任务：运行测试、lint、typecheck、编译检查、实际运行
      - 文档任务：检查格式、内容完整性、逻辑连贯性
      - 设计任务：检查方案合理性、可行性、边界情况覆盖
      - 配置任务：验证配置是否生效、格式是否正确

      判定标准：
      - 用户需求已完整实现
      - 实现结果正确可用
    on_pass: done
    on_fail: loop
    max_fail_count: 100
