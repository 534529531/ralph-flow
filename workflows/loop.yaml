description: 单步骤循环执行，适合简单任务的持续迭代直到完成

manual_step:

steps:
    - id: loop
      desc: 自动循环执行任务
      do: 执行用户指定的任务，持续工作直到任务完全完成。你需要持续工作，一步步推进，直到所有要求都满足为止。
      input: 用户输入的任务描述
      output: 任务完成的证明（代码、文件、测试结果等）
      check: |
           以独立 QA 审查员视角审视工作成果。

           审查步骤：

           1. **工具验证**
              - 运行 `npm test` 或相关测试命令验证功能
              - 使用 Bash 检查生成的文件是否存在、内容是否正确
              - 使用 Grep 搜索常见问题模式（TODO、FIXME、debugger 等残留）
              - 检查是否所有需求点都有对应的实现

           2. **严格标准**
              以下情况必须判定为不通过：
              - 有任何测试失败
              - 有任何 TODO/FIXME/console.log 残留
              - 功能未完整实现（缺少核心逻辑）
              - 代码有语法错误或编译不通过
              - 需求文档中有未实现的功能点
              - 审查者对此没有100%的信心
      on_pass: done
      on_fail: loop
      max_fail_count: 100
