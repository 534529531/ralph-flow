manual_phase:

steps:
    - id: loop
      desc: 自动循环执行任务
      do: 执行用户指定的任务，持续工作直到任务完全完成。你需要持续工作，一步步推进，直到所有要求都满足为止。
      input: 用户输入的任务描述
      output: 任务完成的证明（代码、文件、测试结果等）
      check: |
           切换到**严格审查者**模式，以独立 QA 审查员视角审视工作成果。

           审查步骤：

           1. **委派独立审查**（如果 Task 工具可用）
              使用 Task 工具委派独立的子 agent 进行审查，子 agent 的任务：
              - 不带有"这是我做的"偏见
              - 客观审查代码/文档是否满足所有需求
              - 列出发现的具体问题
              - 返回审查结论（通过/不通过 + 理由）

           2. **工具验证**（无论是否使用 Task 都必须执行）
              使用以下工具进行客观验证：
              - 运行 `npm test` 或相关测试命令验证功能
              - 使用 Bash 检查生成的文件是否存在、内容是否正确
              - 使用 Grep 搜索常见问题模式（TODO、FIXME、debugger 等残留）
              - 检查是否所有需求点都有对应的实现

           3. **严格标准**
              以下情况必须判定为不通过：
              - 有任何测试失败
              - 有任何 TODO/FIXME/console.log 残留
              - 功能未完整实现（缺少核心逻辑）
              - 代码有语法错误或编译不通过
              - 需求文档中有未实现的功能点
              - 审查者对此没有100%的信心
      on_pass: done
      on_fail: loop
      max_fail_count: 100
